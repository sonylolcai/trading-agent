version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: pa-agent-backend:latest
    container_name: pa-agent-backend
    restart: unless-stopped
    networks:
      - pa-agent-net
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    volumes:
      # Persist runtime data
      - pa-agent-config:/app/config
      - pa-agent-logs:/app/logs
      - pa-agent-records:/app/records
      - pa-agent-cache:/app/cache

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    image: pa-agent-frontend:latest
    container_name: pa-agent-frontend
    restart: unless-stopped
    networks:
      - pa-agent-net

  web:
    image: nginx:alpine
    container_name: pa-agent-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    networks:
      - pa-agent-net
    volumes:
      - ./pa-agent-nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  pa-agent-net:

volumes:
  pa-agent-config:
  pa-agent-logs:
  pa-agent-records:
  pa-agent-cache:
